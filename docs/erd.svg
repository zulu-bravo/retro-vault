<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="640" viewBox="0 0 1500 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="many" viewBox="0 0 16 14" refX="15" refY="7" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="14" orient="auto">
      <line x1="3" y1="7" x2="15" y2="0" stroke="#1453b8" stroke-width="1.5" fill="none"/>
      <line x1="3" y1="7" x2="15" y2="7" stroke="#1453b8" stroke-width="1.5" fill="none"/>
      <line x1="3" y1="7" x2="15" y2="14" stroke="#1453b8" stroke-width="1.5" fill="none"/>
    </marker>
    <marker id="one" viewBox="0 0 8 12" refX="0" refY="6" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="12" orient="auto">
      <line x1="4" y1="0" x2="4" y2="12" stroke="#1453b8" stroke-width="1.5"/>
    </marker>
    <marker id="many-legend" viewBox="0 0 16 14" refX="15" refY="7" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="14" orient="auto">
      <line x1="3" y1="7" x2="15" y2="0" stroke="#1453b8" stroke-width="1.5" fill="none"/>
      <line x1="3" y1="7" x2="15" y2="7" stroke="#1453b8" stroke-width="1.5" fill="none"/>
      <line x1="3" y1="7" x2="15" y2="14" stroke="#1453b8" stroke-width="1.5" fill="none"/>
    </marker>
    <marker id="one-legend" viewBox="0 0 8 12" refX="0" refY="6" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="12" orient="auto">
      <line x1="4" y1="0" x2="4" y2="12" stroke="#1453b8" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1500" height="640" fill="#ffffff"/>

  <text x="750" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">RetroVault — Entity Relationships</text>
  <text x="750" y="56" text-anchor="middle" font-size="12" fill="#64748b">Crow's-foot notation. "One" bar at the parent; "many" foot at the child.</text>

  <g stroke="#1453b8" stroke-width="1.5" fill="none">
    <line x1="310" y1="95" x2="770" y2="230" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="670" y1="90" x2="770" y2="230" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="560" y1="105" x2="560" y2="215" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="560" y1="265" x2="560" y2="375" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="770" y1="250" x2="670" y2="390" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="880" y1="265" x2="880" y2="375" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="990" y1="250" x2="1090" y2="390" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="880" y1="425" x2="880" y2="535" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="1140" y1="240" x2="990" y2="240" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="1180" y1="265" x2="990" y2="390" marker-start="url(#one)" marker-end="url(#many)"/>
    <line x1="1270" y1="265" x2="1200" y2="375" marker-start="url(#one)" marker-end="url(#many)"/>
    <polyline points="1360,245 1430,245 1430,560 990,560" marker-start="url(#one)" marker-end="url(#many)"/>
  </g>

  <g font-size="11" fill="#475569" font-style="italic">
    <text x="1067" y="234" text-anchor="middle">facilitates</text>
    <text x="1100" y="332" text-anchor="middle">authors / kudos</text>
    <text x="1298" y="325" text-anchor="start">owner / assignee</text>
    <text x="1444" y="408" text-anchor="start">voter</text>
  </g>

  <g>
    <g>
      <rect x="90" y="55" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="200" y="86" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_team__c</text>
    </g>
    <g>
      <rect x="450" y="55" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="560" y="86" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_release__c</text>
    </g>
    <g>
      <rect x="1140" y="215" width="220" height="50" rx="6" fill="#eef2f7" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="1250" y="246" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="600">user__sys</text>
    </g>
    <g>
      <rect x="450" y="215" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="560" y="246" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_feature__c</text>
    </g>
    <g>
      <rect x="770" y="215" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="880" y="246" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_board__c</text>
    </g>
    <g>
      <rect x="450" y="375" width="220" height="50" rx="6" fill="#4b73c8" stroke="#0f172a" stroke-width="1"/>
      <text x="560" y="402" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">retro_board_feature__c</text>
      <text x="560" y="418" text-anchor="middle" fill="#e2e8f0" font-size="10" font-style="italic">junction</text>
    </g>
    <g>
      <rect x="770" y="375" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="880" y="406" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_feedback__c</text>
    </g>
    <g>
      <rect x="1090" y="375" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="1200" y="406" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_action__c</text>
    </g>
    <g>
      <rect x="770" y="535" width="220" height="50" rx="6" fill="#1453b8" stroke="#0f172a" stroke-width="1"/>
      <text x="880" y="566" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">retro_vote__c</text>
    </g>
  </g>

  <g transform="translate(90,500)">
    <rect x="0" y="0" width="460" height="95" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="15" y="22" font-size="13" font-weight="700" fill="#0f172a">Legend</text>

    <line x1="25" y1="48" x2="170" y2="48" stroke="#1453b8" stroke-width="1.5" marker-start="url(#one-legend)" marker-end="url(#many-legend)"/>
    <text x="185" y="52" font-size="12" fill="#0f172a">one-to-many (crow's foot on the "many" end)</text>

    <rect x="25" y="68" width="18" height="12" fill="#4b73c8"/>
    <text x="50" y="79" font-size="12" fill="#0f172a">junction (resolves many-to-many)</text>

    <rect x="265" y="68" width="18" height="12" fill="#eef2f7" stroke="#475569" stroke-dasharray="3,2"/>
    <text x="290" y="79" font-size="12" fill="#0f172a">external (Vault system object)</text>
  </g>
</svg>
