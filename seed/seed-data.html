<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroVault - Seed Data</title>
    <link rel="stylesheet" href="../xpages/css/vault-theme.css">
    <style>
        .seed-log { font-family: monospace; font-size: 12px; background: #1A1A1A; color: #adff2f;
                    padding: 16px; border-radius: 8px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; }
        .seed-log .error { color: #ff4444; }
        .seed-log .info { color: #4fc3f7; }
        .seed-log .success { color: #66bb6a; }
    </style>
</head>
<body>
    <div class="vault-page" style="padding-top:24px;">
        <div class="vault-container" style="max-width: 800px;">
            <div class="vault-page-header">
                <div>
                    <h1 class="vault-page-header__title">Seed Data</h1>
                    <p class="vault-page-header__subtitle">Populate RetroVault with sample retrospective data</p>
                </div>
            </div>
            <div class="vault-card vault-mb-24">
                <div class="vault-card__body">
                    <p class="vault-mb-16">This will create 3 teams, 4 retro boards, 24 feedback items, 10 action items, and 20 votes using existing Vault users.</p>
                    <div class="vault-flex vault-gap-8">
                        <button class="vault-btn vault-btn--primary" id="seedBtn" onclick="runSeed()">Run Seed</button>
                        <span id="statusText" class="vault-text-muted" style="align-self:center;"></span>
                    </div>
                </div>
            </div>
            <div class="seed-log" id="log"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/q.js/1.5.1/q.min.js"></script>
    <script src="https://crm-app-cdn.veeva-vcrm.com/x-pages/library/X-PagesLibrary.js"></script>
    <script src="../xpages/js/data-service.js"></script>
    <script src="../xpages/js/app.js"></script>
    <script>
    var logEl = document.getElementById('log');
    var statusEl = document.getElementById('statusText');

    function log(msg, cls) {
        cls = cls || '';
        logEl.innerHTML += '<span class="' + cls + '">' + msg + '</span>\n';
        logEl.scrollTop = logEl.scrollHeight;
    }

    function extractId(resp) {
        if (typeof resp === 'object' && resp !== null) {
            return resp.id || resp.Id || resp.ID || JSON.stringify(resp);
        }
        return resp;
    }

    async function runSeed() {
        var btn = document.getElementById('seedBtn');
        btn.disabled = true;
        statusEl.textContent = 'Running...';
        logEl.innerHTML = '';

        try {
            // Step 1: Get existing Vault users
            log('Fetching Vault users...', 'info');
            var users = await VaultDS.query('user__sys', ['id', 'name__v'], { limit: 10 });
            if (!users.length) {
                log('ERROR: No users found in user__sys. Cannot proceed.', 'error');
                return;
            }
            log('Found ' + users.length + ' users', 'success');
            users.forEach(function(u) { log('  - ' + (u.name__v || u.id)); });

            // Assign users to roles (use first 9 or repeat if fewer)
            while (users.length < 9) users = users.concat(users);
            var u = users.slice(0, 9);

            // Step 2: Create Teams
            log('\nCreating teams...', 'info');
            var teamData = [
                { name__v: 'Pegasus' },
                { name__v: 'Griffin' },
                { name__v: 'Orca' }
            ];
            var teamIds = [];
            for (var i = 0; i < teamData.length; i++) {
                var tResp = await VaultDS.create('team__c', teamData[i]);
                var tid = extractId(tResp);
                teamIds.push(tid);
                log('  Created team: ' + teamData[i].name__v + ' [' + tid + ']', 'success');
            }

            // Step 3: Create Retro Boards
            log('\nCreating retro boards...', 'info');
            var boardData = [
                { name__v: 'Sprint 10 Retro', team: 0, facilitator: 0, release_tag: 'v2.3.0', date: '2026-01-10', status: 'closed__c' },
                { name__v: 'Sprint 11 Retro', team: 0, facilitator: 1, release_tag: 'v2.4.0', date: '2026-01-24', status: 'closed__c' },
                { name__v: 'Sprint 12 Retro', team: 1, facilitator: 3, release_tag: 'v3.0.0', date: '2026-02-07', status: 'closed__c' },
                { name__v: 'Hotfix Post-Mortem', team: 2, facilitator: 6, release_tag: 'v2.4.1-hotfix', date: '2026-02-14', status: 'active__c' }
            ];
            var boardIds = [];
            for (var i = 0; i < boardData.length; i++) {
                var bd = boardData[i];
                var bResp = await VaultDS.create('retro_board__c', {
                    name__v: bd.name__v,
                    team__c: teamIds[bd.team],
                    facilitator__c: u[bd.facilitator].id,
                    release_tag__c: bd.release_tag,
                    board_date__c: bd.date,
                    status__c: bd.status
                });
                var bid = extractId(bResp);
                boardIds.push(bid);
                log('  Created board: ' + bd.name__v + ' [' + bid + ']', 'success');
            }

            // Step 4: Create Feedback Items
            log('\nCreating feedback items...', 'info');
            var feedbackData = [
                // Board 0 - Sprint 10
                { board: 0, author: 1, cat: 'went_well__c', theme: 'tooling__c', content: 'New CI pipeline cut build times by 40%', votes: 5 },
                { board: 0, author: 2, cat: 'went_well__c', theme: 'process__c', content: 'Daily standups were focused and efficient', votes: 3 },
                { board: 0, author: 0, cat: 'didnt_go_well__c', theme: 'tooling__c', content: 'Flaky integration tests blocked deployments 3 times', votes: 7 },
                { board: 0, author: 1, cat: 'didnt_go_well__c', theme: 'scope__c', content: 'Mid-sprint scope changes derailed our estimates', votes: 4 },
                { board: 0, author: 2, cat: 'ideas__c', theme: 'tooling__c', content: 'Invest in test quarantine system for flaky tests', votes: 6 },
                { board: 0, author: 0, cat: 'ideas__c', theme: 'process__c', content: 'Add a scope freeze after sprint planning', votes: 2 },
                // Board 1 - Sprint 11
                { board: 1, author: 1, cat: 'went_well__c', theme: 'communication__c', content: 'Cross-team sync meetings improved alignment', votes: 4 },
                { board: 1, author: 2, cat: 'went_well__c', theme: 'quality__c', content: 'Zero production incidents this sprint', votes: 5 },
                { board: 1, author: 0, cat: 'went_well__c', theme: 'morale__c', content: 'Team lunch boosted morale significantly', votes: 3 },
                { board: 1, author: 1, cat: 'didnt_go_well__c', theme: 'tooling__c', content: 'Build times increased after monorepo migration', votes: 6 },
                { board: 1, author: 2, cat: 'didnt_go_well__c', theme: 'staffing__c', content: 'Lost a senior engineer mid-sprint to another project', votes: 3 },
                { board: 1, author: 0, cat: 'ideas__c', theme: 'tooling__c', content: 'Set up build caching to reduce compile times', votes: 4 },
                // Board 2 - Sprint 12
                { board: 2, author: 4, cat: 'went_well__c', theme: 'process__c', content: 'New code review checklist caught bugs early', votes: 4 },
                { board: 2, author: 5, cat: 'went_well__c', theme: 'communication__c', content: 'Architecture decision records improved knowledge sharing', votes: 3 },
                { board: 2, author: 3, cat: 'didnt_go_well__c', theme: 'scope__c', content: 'Feature requirements changed after development started', votes: 5 },
                { board: 2, author: 4, cat: 'didnt_go_well__c', theme: 'tooling__c', content: 'Staging environment was down for 2 days', votes: 4 },
                { board: 2, author: 5, cat: 'didnt_go_well__c', theme: 'process__c', content: 'PR reviews taking 3+ days on average', votes: 3 },
                { board: 2, author: 3, cat: 'ideas__c', theme: 'process__c', content: 'Implement PR size limits and auto-assign reviewers', votes: 5 },
                // Board 3 - Hotfix Post-Mortem
                { board: 3, author: 7, cat: 'went_well__c', theme: 'communication__c', content: 'Incident response communication was fast and clear', votes: 2 },
                { board: 3, author: 8, cat: 'went_well__c', theme: 'quality__c', content: 'Root cause identified within 30 minutes', votes: 3 },
                { board: 3, author: 6, cat: 'didnt_go_well__c', theme: 'tooling__c', content: 'Alert fatigue delayed initial response by 15 minutes', votes: 4 },
                { board: 3, author: 7, cat: 'didnt_go_well__c', theme: 'process__c', content: 'No runbook existed for this failure scenario', votes: 3 },
                { board: 3, author: 8, cat: 'ideas__c', theme: 'tooling__c', content: 'Reduce noise in alerting by tuning thresholds', votes: 5 },
                { board: 3, author: 6, cat: 'ideas__c', theme: 'process__c', content: 'Create runbooks for all critical service failures', votes: 4 }
            ];

            var feedbackIds = [];
            var feedbackVotes = [];
            for (var i = 0; i < feedbackData.length; i++) {
                var fd = feedbackData[i];
                var fResp = await VaultDS.create('feedback_item__c', {
                    name__v: fd.content.substring(0, 80),
                    retro_board__c: boardIds[fd.board],
                    author__c: u[fd.author].id,
                    category__c: fd.cat,
                    content__c: fd.content,
                    ai_theme__c: fd.theme,
                    vote_count__c: fd.votes
                });
                var fid = extractId(fResp);
                feedbackIds.push(fid);
                feedbackVotes.push(fd.votes);
                if (i % 6 === 0) log('  Created ' + (i + 1) + '/' + feedbackData.length + ' feedback items...', 'info');
            }
            log('  Created all ' + feedbackData.length + ' feedback items', 'success');

            // Step 5: Create Action Items
            log('\nCreating action items...', 'info');
            var actionData = [
                { board: 0, owner: 2, title: 'Set up test quarantine system', status: 'done__c', due: '2026-01-24', completed: '2026-01-22T10:30:00Z' },
                { board: 0, owner: 0, title: 'Document scope change process', status: 'done__c', due: '2026-01-31', completed: '2026-01-28T14:00:00Z' },
                { board: 1, owner: 1, title: 'Implement build caching', status: 'done__c', due: '2026-02-07', completed: '2026-02-05T09:15:00Z' },
                { board: 1, owner: 2, title: 'Create onboarding guide for new engineers', status: 'done__c', due: '2026-02-14', completed: '2026-02-10T16:45:00Z' },
                { board: 2, owner: 4, title: 'Set up PR size linter', status: 'in_progress__c', due: '2026-02-21', completed: null },
                { board: 2, owner: 3, title: 'Fix staging environment reliability', status: 'in_progress__c', due: '2026-02-21', completed: null },
                { board: 2, owner: 5, title: 'Write ADR template and examples', status: 'done__c', due: '2026-02-14', completed: '2026-02-13T11:00:00Z' },
                { board: 3, owner: 7, title: 'Tune alerting thresholds', status: 'open__c', due: '2026-02-28', completed: null },
                { board: 3, owner: 6, title: 'Create runbooks for critical failures', status: 'open__c', due: '2026-03-07', completed: null },
                { board: 3, owner: 8, title: 'Post-mortem follow-up meeting', status: 'done__c', due: '2026-02-21', completed: '2026-02-18T10:00:00Z' }
            ];

            for (var i = 0; i < actionData.length; i++) {
                var ad = actionData[i];
                var fields = {
                    name__v: ad.title,
                    retro_board__c: boardIds[ad.board],
                    owner__c: u[ad.owner].id,
                    status__c: ad.status,
                    due_date__c: ad.due
                };
                if (ad.completed) fields.completed_at__c = ad.completed;
                await VaultDS.create('action_item__c', fields);
            }
            log('  Created all ' + actionData.length + ' action items', 'success');

            // Step 6: Create Votes
            log('\nCreating votes...', 'info');
            var voteCount = 0;
            for (var fi = 0; fi < feedbackIds.length; fi++) {
                var numVotes = feedbackVotes[fi];
                for (var vi = 0; vi < numVotes && vi < u.length; vi++) {
                    await VaultDS.create('vote__c', {
                        name__v: feedbackIds[fi] + '_' + u[vi].id,
                        feedback_item__c: feedbackIds[fi],
                        voter__c: u[vi].id,
                        active__c: true
                    });
                    voteCount++;
                }
            }
            log('  Created ' + voteCount + ' votes', 'success');

            log('\n=== SEED COMPLETE ===', 'success');
            log('Created: 3 teams, 4 boards, 24 feedback items, 10 action items, ' + voteCount + ' votes', 'success');
            statusEl.textContent = 'Done!';
            statusEl.style.color = '#2E844A';

        } catch (err) {
            log('\nERROR: ' + (err.message || JSON.stringify(err)), 'error');
            statusEl.textContent = 'Failed';
            statusEl.style.color = '#EA001E';
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
